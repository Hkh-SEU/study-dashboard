<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="数学错题、专业课错题和复习计划" />
    <title>学习文件看板</title>
    <link rel="stylesheet" href="assets/vendor/docsify/vue.css" />
    <link rel="stylesheet" href="assets/cloud.css" />
  </head>
  <body>
    <div id="app">加载中...</div>
    <nav class="mobile-bottom-nav" aria-label="手机底部导航"><a class="mobile-bottom-nav-link" href="#/" data-route="home">首页</a><a class="mobile-bottom-nav-link" href="#/plan" data-route="plan">计划</a><a class="mobile-bottom-nav-link" href="#/math" data-route="math">数学</a><a class="mobile-bottom-nav-link" href="#/major" data-route="major">专业课</a></nav>
    <script>
      window.$docsify = {
        name: "学习文件看板",
        loadSidebar: true,
        subMaxLevel: 0,
        auto2top: true,
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "搜索错题、知识点、计划...",
          noData: "没有找到相关内容",
          depth: 4
        }
      };
      function updateBottomNav() {
        var hash = window.location.hash || "#/";
        var route = hash.indexOf("#/plan") === 0 ? "plan" :
          hash.indexOf("#/math") === 0 ? "math" :
          hash.indexOf("#/major") === 0 ? "major" : "home";
        document.querySelectorAll(".mobile-bottom-nav-link").forEach(function (item) {
          item.classList.toggle("active", item.dataset.route === route);
        });
      }
      window.addEventListener("hashchange", updateBottomNav);
      window.addEventListener("DOMContentLoaded", updateBottomNav);
    </script>
    <script src="assets/vendor/docsify/docsify.min.js"></script>
    <script src="assets/vendor/docsify/search.min.js"></script>
  </body>
</html>
