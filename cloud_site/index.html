<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="数学错题、专业课错题和复习计划" />
    <title>学习文件看板</title>
    <link rel="stylesheet" href="assets/vendor/docsify/vue.css" />
    <link rel="stylesheet" href="assets/cloud.css" />
  </head>
  <body>
    <div id="app">加载中...</div>
    <nav class="mobile-bottom-nav" aria-label="手机底部导航"><a class="mobile-bottom-nav-link" href="#/" data-route="home">首页</a><a class="mobile-bottom-nav-link" href="#/plan" data-route="plan">计划</a><a class="mobile-bottom-nav-link" href="#/math" data-route="math">数学</a><a class="mobile-bottom-nav-link" href="#/major" data-route="major">专业</a></nav>
    <script>
      window.$docsify = {
        name: "复习目录",
        loadSidebar: true,
        subMaxLevel: 0,
        auto2top: true,
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "搜索错题、知识点、计划...",
          noData: "没有找到相关内容",
          depth: 4
        },
        plugins: [
          function (hook) {
            hook.doneEach(function () {
              refreshStudyNavigation();
            });
          }
        ]
      };
      function updateBottomNav() {
        var hash = window.location.hash || "#/";
        var route = hash.indexOf("#/plan") === 0 ? "plan" :
          hash.indexOf("#/math") === 0 ? "math" :
          hash.indexOf("#/major") === 0 ? "major" : "home";
        document.querySelectorAll(".mobile-bottom-nav-link").forEach(function (item) {
          item.classList.toggle("active", item.dataset.route === route);
        });
      }
      function targetIdFromHash() {
        var hash = window.location.hash || "";
        var match = hash.match(/[?&]id=([^&]+)/);
        return match ? decodeURIComponent(match[1]) : "";
      }
      function targetIdFromHref(href) {
        var match = (href || "").match(/[?&]id=([^&]+)/);
        return match ? decodeURIComponent(match[1]) : "";
      }
      function closeMobileSidebar() {
        if (window.innerWidth <= 768) {
          document.body.classList.add("close");
        }
      }
      function getDirectChildUl(item) {
        for (var i = 0; i < item.children.length; i += 1) {
          if (item.children[i].tagName === "UL") {
            return item.children[i];
          }
        }
        return null;
      }
      function getDirectChildLink(item) {
        for (var i = 0; i < item.children.length; i += 1) {
          if (item.children[i].tagName === "A") {
            return item.children[i];
          }
        }
        return null;
      }
      function sidebarDepth(item, root) {
        var depth = 0;
        var node = item;
        while (node && node !== root) {
          if (node.tagName === "LI") {
            depth += 1;
          }
          node = node.parentElement;
        }
        return depth;
      }
      function scrollToAnchorWithRetry(id, attempt) {
        if (!id) {
          return;
        }
        var tries = attempt || 0;
        var target = document.getElementById(id);
        if (target) {
          target.scrollIntoView({ block: "start", behavior: "auto" });
          return;
        }
        if (tries < 25) {
          window.setTimeout(function () {
            scrollToAnchorWithRetry(id, tries + 1);
          }, 80);
        }
      }
      function scrollToCurrentTarget() {
        scrollToAnchorWithRetry(targetIdFromHash(), 0);
      }
      function enhanceSidebar() {
        var sidebar = document.querySelector(".sidebar");
        if (!sidebar) {
          return;
        }
        var targetId = targetIdFromHash();
        sidebar.querySelectorAll("li").forEach(function (item) {
          var childUl = getDirectChildUl(item);
          var link = getDirectChildLink(item);
          var depth = sidebarDepth(item, sidebar);
          if (childUl) {
            item.classList.add("nav-collapsible");
            if (depth <= 1) {
              item.classList.add("nav-open");
            }
            if (depth === 2) {
              item.classList.add("nav-date");
              if (!item.dataset.boundCollapse) {
                item.dataset.boundCollapse = "true";
                link && link.addEventListener("click", function () {
                  item.classList.toggle("nav-open");
                  scrollToAnchorWithRetry(targetIdFromHref(link.getAttribute("href")), 0);
                });
              }
            }
          }
          if (link && link.getAttribute("href") && targetId && link.getAttribute("href").indexOf("id=" + encodeURIComponent(targetId)) !== -1) {
            item.classList.add("nav-current");
            var parent = item.parentElement;
            while (parent && parent !== sidebar) {
              if (parent.tagName === "LI") {
                parent.classList.add("nav-open");
              }
              parent = parent.parentElement;
            }
          } else {
            item.classList.remove("nav-current");
          }
          if (link && !link.dataset.boundClose) {
            link.dataset.boundClose = "true";
            link.addEventListener("click", function () {
              scrollToAnchorWithRetry(targetIdFromHref(link.getAttribute("href")), 0);
              if (!(childUl && depth === 2)) {
                window.setTimeout(closeMobileSidebar, 120);
              }
            });
          }
        });
      }
      function refreshStudyNavigation() {
        updateBottomNav();
        window.setTimeout(function () {
          enhanceSidebar();
          scrollToCurrentTarget();
        }, 120);
      }
      window.addEventListener("hashchange", refreshStudyNavigation);
      window.addEventListener("DOMContentLoaded", refreshStudyNavigation);
    </script>
    <script src="assets/vendor/docsify/docsify.min.js"></script>
    <script src="assets/vendor/docsify/search.min.js"></script>
  </body>
</html>
